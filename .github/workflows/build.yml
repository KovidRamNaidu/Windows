name: Build Windows Executable

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      enable_rdp:
        description: 'Enable RDP interactive debugging'
        type: boolean
        required: false
        default: false

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      run: dotnet restore SnapPickWin.csproj

    - name: Build and Publish Single-File Executable
      run: |
        dotnet publish SnapPickWin.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

    - name: Run Headless Assembly Verification
      shell: pwsh
      run: |
        $dll = Get-ChildItem -Path . -Recurse -Filter SnapPickWin.dll | Select-Object -First 1
        if ($dll -ne $null) {
            $dllPath = $dll.FullName
            Write-Host "Loading assembly: $dllPath"
            $assembly = [System.Reflection.Assembly]::LoadFrom($dllPath)
            $type = $assembly.GetType("SnapPickWin.Services.FirebaseService")
            if ($type -eq $null) {
                Write-Error "Failed to locate SnapPickWin.Services.FirebaseService type!"
                exit 1
            }
            $instance = [System.Activator]::CreateInstance($type)
            $configProp = $type.GetProperty("Config")
            $config = $configProp.GetValue($instance)
            if ($config -eq $null -or [string]::IsNullOrEmpty($config.ApiKey)) {
                Write-Error "Headless Verification Failed: Firebase configuration is null or API Key is missing!"
                exit 1
            }
            Write-Host "Success: Embedded GoogleService-Info.plist loaded and parsed correctly on runner! Project ID: $($config.ProjectId)"
        } else {
            Write-Error "SnapPickWin.dll assembly file not found!"
            exit 1
        }

    - name: Upload Compiled Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SnapPickWin-Executable
        path: publish/

    - name: Enable Remote Desktop (RDP)
      if: ${{ github.event.inputs.enable_rdp == 'true' }}
      run: |
        $Password = ConvertTo-SecureString "P@ssword123!" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $Password
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    - name: Setup tmate session for RDP
      if: ${{ github.event.inputs.enable_rdp == 'true' }}
      shell: pwsh
      run: |
        # 1. Install tmate
        choco install tmate -y

        # 2. Start tmate in background
        Write-Host "Starting tmate in background..."
        $proc = Start-Process -FilePath "tmate" -ArgumentList "-F" -NoNewWindow -PassThru

        # 3. Poll for SSH connection string
        $sshCommand = ""
        for ($i = 0; $i -lt 24; $i++) {
            Start-Sleep -Seconds 5
            $messages = & tmate show-messages
            foreach ($line in $messages) {
                if ($line -match "(ssh\s+.*@\S+)") {
                    $sshCommand = $Matches[1]
                    break
                }
            }
            if ($sshCommand -ne "") { break }
        }

        if ($sshCommand -eq "") {
            Write-Error "Failed to retrieve tmate SSH connection string!"
            exit 1
        }

        # 4. Print copy-pasteable command with RDP port forwarding
        $rdpCommand = $sshCommand -replace "ssh", "ssh -L 3389:localhost:3389"
        Write-Host ""
        Write-Host "========================================================================"
        Write-Host "👉 RUN THIS COMMAND IN YOUR MAC TERMINAL TO CONNECT RDP:"
        Write-Host ""
        Write-Host "   $rdpCommand"
        Write-Host ""
        Write-Host "Then open Microsoft Remote Desktop and connect to 'localhost'"
        Write-Host "Username: runneradmin | Password: P@ssword123!"
        Write-Host "========================================================================"
        Write-Host ""

        # 5. Keep runner alive
        while ($proc.HasExited -eq $false) {
            Start-Sleep -Seconds 10
        }
