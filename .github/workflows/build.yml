name: Build Windows Executable

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      enable_rdp:
        description: 'Enable RDP interactive debugging'
        type: boolean
        required: false
        default: false

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      run: dotnet restore SnapPickWin.csproj

    - name: Build and Publish Single-File Executable
      run: |
        dotnet publish SnapPickWin.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

    - name: Run Headless Assembly Verification
      shell: pwsh
      run: |
        $dll = Get-ChildItem -Path . -Recurse -Filter SnapPickWin.dll | Select-Object -First 1
        if ($dll -ne $null) {
            $dllPath = $dll.FullName
            Write-Host "Loading assembly: $dllPath"
            $assembly = [System.Reflection.Assembly]::LoadFrom($dllPath)
            $type = $assembly.GetType("SnapPickWin.Services.FirebaseService")
            if ($type -eq $null) {
                Write-Error "Failed to locate SnapPickWin.Services.FirebaseService type!"
                exit 1
            }
            $instance = [System.Activator]::CreateInstance($type)
            $configProp = $type.GetProperty("Config")
            $config = $configProp.GetValue($instance)
            if ($config -eq $null -or [string]::IsNullOrEmpty($config.ApiKey)) {
                Write-Error "Headless Verification Failed: Firebase configuration is null or API Key is missing!"
                exit 1
            }
            Write-Host "Success: Embedded GoogleService-Info.plist loaded and parsed correctly on runner! Project ID: $($config.ProjectId)"
        } else {
            Write-Error "SnapPickWin.dll assembly file not found!"
            exit 1
        }

    - name: Upload Compiled Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SnapPickWin-Executable
        path: publish/

    - name: Start Pinggy RDP Tunnel
      if: ${{ github.event.inputs.enable_rdp == 'true' }}
      shell: pwsh
      run: |
        # 1. Enable Remote Desktop (RDP)
        $Password = ConvertTo-SecureString "P@ssword123!" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $Password
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

        # 2. Start Pinggy SSH tunnel in background, outputting connection data to log
        Write-Host "Starting Pinggy TCP Tunnel to expose RDP (port 3389)..."
        $tunnelProc = Start-Process -FilePath "ssh" -ArgumentList "-o", "StrictHostKeyChecking=no", "-o", "ServerAliveInterval=30", "-p", "443", "-R0:localhost:3389", "tcp@pinggy.io" -NoNewWindow -PassThru -RedirectStandardOutput "pinggy.log" -RedirectStandardError "pinggy_err.log"

        # 3. Poll log until the public RDP URL is printed
        $pinggyLink = ""
        for ($i = 0; $i -lt 12; $i++) {
            Start-Sleep -Seconds 5
            if (Test-Path "pinggy.log") {
                $content = Get-Content "pinggy.log" -Raw
                if ($content -match "(tcp\.pinggy\.io:\d+)") {
                    $pinggyLink = $Matches[1]
                    break
                }
            }
        }

        if ($pinggyLink -eq "") {
            Write-Error "Failed to retrieve Pinggy tunnel link! Standard Log:"
            Get-Content "pinggy.log" -ErrorAction SilentlyContinue
            Write-Error "Error Log:"
            Get-Content "pinggy_err.log" -ErrorAction SilentlyContinue
            exit 1
        }

        # 4. Print visual connection guide
        Write-Host ""
        Write-Host "========================================================================"
        Write-Host "👉 CONNECT TO THIS RDP SERVER USING MICROSOFT REMOTE DESKTOP:"
        Write-Host ""
        Write-Host "   Server Name: $pinggyLink"
        Write-Host ""
        Write-Host "Credentials:"
        Write-Host "   Username: runneradmin"
        Write-Host "   Password: P@ssword123!"
        Write-Host "========================================================================"
        Write-Host ""

        # 5. Keep runner alive
        while ($tunnelProc.HasExited -eq $false) {
            Start-Sleep -Seconds 10
        }
